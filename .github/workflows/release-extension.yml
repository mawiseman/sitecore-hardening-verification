name: Release Chrome Extension

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'minor'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump manifest version
        id: bump
        shell: bash
        run: |
          MANIFEST=chrome-extension/manifest.json
          CURRENT=$(node -p "require('./$MANIFEST').version")
          BUMP="${{ github.event.inputs.bump }}"
          NEW=$(node -e "
            const [maj, min, pat] = '$CURRENT'.split('.').map(Number);
            const map = { major: [maj+1, 0, 0], minor: [maj, min+1, 0], patch: [maj, min, pat+1] };
            console.log(map['$BUMP'].join('.'));
          ")
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('$MANIFEST', 'utf8'));
            m.version = '$NEW';
            fs.writeFileSync('$MANIFEST', JSON.stringify(m, null, 2) + '\n');
          "
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT -> $NEW"

      - name: Build extension package
        shell: bash
        run: |
          mkdir -p dist
          cd chrome-extension
          zip -r "../dist/sitecore-hardening-verifier-${{ steps.bump.outputs.new }}.zip" . \
            -x "*.DS_Store" "*/node_modules/*"
          cd ..
          ls -la dist/

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chrome-extension/manifest.json
          git commit -m "Release chrome extension v${{ steps.bump.outputs.new }}"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: Chrome Extension ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
          files: dist/sitecore-hardening-verifier-${{ steps.bump.outputs.new }}.zip
